<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            color: white;
            padding: 10px 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        nav #Logo img {
            height: 40px;
        }
        nav button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        nav button:hover {
            background-color: #218838;
        }
        #productGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            padding: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            padding: 8px;
        }

        .card h3 {
            font-size: 14px;
            text-align: center;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card .price {
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
        }

        /* Tabs */
        #tabs {
            display: flex;
            gap: 10px;
            padding: 20px 24px 0;
            max-width: 1100px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 20px;
            border: 2px solid #28a745;
            background: white;
            color: #28a745;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab:hover, .tab.active {
            background: #28a745;
            color: white;
        }

        body.dark .tab {
            background: #1e1e1e;
            color: #4ade80;
            border-color: #4ade80;
        }

        body.dark .tab:hover,
        body.dark .tab.active {
            background: #4ade80;
            color: #0f0f0f;
        }

        /* Tabs */
        body.dark {
            background-color: #0f0f0f;
            color: white;
        }

        body.dark nav {
            background-color: #111;
        }

        body.dark .card {
            background-color: #1e1e1e;
            color: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        body.dark .card .price {
            color: #4ade80;
        }


        /* Pagination */
        #pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 24px;
            flex-wrap: wrap;
        }

        #pagination button {
            padding: 8px 14px;
            border: 2px solid #28a745;
            background: white;
            color: #28a745;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            min-width: 40px;
        }

        #pagination button:hover {
            background: #28a745;
            color: white;
        }

        #pagination button.active-page {
            background: #28a745;
            color: white;
        }

        #pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        body.dark #pagination button {
            background: #1e1e1e;
            color: #4ade80;
            border-color: #4ade80;
        }

        body.dark #pagination button:hover,
        body.dark #pagination button.active-page {
            background: #4ade80;
            color: #0f0f0f;
        }
        </style>
</head>
<body>
   <nav>
        <div id="Logo">
            <img src="logo.png" alt="logo" />
        </div>
        <div style="display:flex; align-items:center; gap:16px;">
            <span id="userName" style="color:white; font-weight:600;"></span>
            <button id="themeButton">Dark Mode</button>
            <button id="logoutBtn" style="background:#e53e3e; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Logout</button>
        </div>
    </nav>
    <div id="tabs">
        <button class="tab active" onclick="filterProducts('all')">All</button>
        <button class="tab" onclick="filterProducts('smartphones')">Smartphones</button>
        <button class="tab" onclick="filterProducts('laptops')">Laptops</button>
        <button class="tab" onclick="filterProducts('mens-shirts')">Men's Shirts</button>
        <button class="tab" onclick="filterProducts('mens-shoes')">Men's Shoes</button>
        <button class="tab" onclick="filterProducts('mens-watches')">Watches</button>
        <button class="tab" onclick="filterProducts('sunglasses')">Sunglasses</button>
        <button class="tab" onclick="filterProducts('automotive')">Automotive</button>
        <button class="tab" onclick="filterProducts('motorcycle')">Motorcycle</button>
    </div>
    <div id="productGrid"></div>
    <div id="pagination"></div>
    <script src="Home.js"></script>

</body>
</html>
